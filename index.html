<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Multilingual ATS Resume Builder</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>

    <header class="app-header">
        <div class="header-container">
            <div class="logo-container">
                <span id="app-main-title" class="app-logo">Build Your Resume</span>
            </div>
            <nav class="controls-nav">
                <div class="control-group">
                    <label for="lang-switch">Language:</label>
                    <select id="lang-switch">
                        <option value="en">English (US)</option>
                        <option value="kr">한국어 (KR)</option>
                    </select>
                </div>
                <div class="control-group">
                    <label for="template-select">Template:</label>
                    <select id="template-select">
                        <option value="modern">Modern Corporate</option>
                        <option value="classic">ATS Friendly (Classic)</option>
                        <option value="creative">Executive Elegant</option>
                        <option value="creative-minimal">Creative Minimal (Sidebar)</option>
                    </select>
                </div>
                <button type="button" id="theme-toggle" class="btn btn-secondary" aria-pressed="false">
                    <span class="mode-icon" aria-hidden="true">🌙</span> Dark Mode
                </button>
            </nav>
        </div>
    </header>

    <main class="workspace-container">
        
        <section class="editor-panel">
            <h2 id="editor-panel-title" class="panel-title">Resume Editor Panel</h2>
            <form id="resume-form" onsubmit="return false;">
                
                <fieldset id="section-personal" class="form-section">
                    <legend>Personal Information</legend>
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="input-fullname">Full Name</label>
                            <input type="text" id="input-fullname" name="fullname" placeholder="John Doe">
                        </div>
                        <div class="form-group">
                            <label for="input-title">Target Professional Title</label>
                            <input type="text" id="input-title" name="title" placeholder="Senior Full-Stack Engineer">
                        </div>
                        <div class="form-group">
                            <label for="input-phone">Phone Number</label>
                            <input type="tel" id="input-phone" name="phone" placeholder="+1 (555) 000-0000">
                        </div>
                        <div class="form-group">
                            <label for="input-email">Email Address</label>
                            <input type="email" id="input-email" name="email" placeholder="john.doe@example.com">
                        </div>
                        <div class="form-group">
                            <label for="input-location">Location (City, Country)</label>
                            <input type="text" id="input-location" name="location" placeholder="New York, USA">
                        </div>
                        <div class="form-group">
                            <label for="input-linkedin">LinkedIn URL</label>
                            <input type="url" id="input-linkedin" name="linkedin" placeholder="https://linkedin.com/in/username">
                        </div>
                        <div class="form-group">
                            <label for="input-portfolio">Portfolio URL</label>
                            <input type="url" id="input-portfolio" name="portfolio" placeholder="https://portfolio.dev">
                        </div>
                        <div class="form-group">
                            <label for="input-website">Personal Website</label>
                            <input type="url" id="input-website" name="website" placeholder="https://blog.dev">
                        </div>
                        <div class="form-group full-width">
                            <label for="input-avatar" id="lbl-avatar">Profile Avatar Photo</label>
                            <div class="custom-file-upload-wrapper">
                                <label class="btn btn-secondary" id="btn-choose-file" for="input-avatar">✨ Choose File</label>
                                <span id="file-name-display" class="file-name-text">No file chosen</span>
                                <input type="file" id="input-avatar" accept="image/*" style="display: none;">
                            </div>
                        </div>
                        <div class="form-group full-width">
                            <label for="input-summary">Professional Summary / Bio</label>
                            <textarea id="input-summary" name="summary" rows="4" placeholder="Passionate software craftsman with 8+ years of expertise..."></textarea>
                        </div>
                    </div>
                </fieldset>

                <fieldset id="section-experience" class="form-section">
                    <legend>Work Experience</legend>
                    <div id="experience-container"></div>
                    <button type="button" id="btn-add-experience" class="btn btn-add">➕ Add Work Experience</button>
                </fieldset>

                <fieldset id="section-education" class="form-section">
                    <legend>Education</legend>
                    <div id="education-container"></div>
                    <button type="button" id="btn-add-education" class="btn btn-add">➕ Add Education</button>
                </fieldset>

                <fieldset id="section-projects" class="form-section">
                    <legend>Projects & Portfolios</legend>
                    <div id="projects-container"></div>
                    <button type="button" id="btn-add-project" class="btn btn-add">➕ Add Project</button>
                </fieldset>

                <fieldset id="section-skills" class="form-section">
                    <legend>Skills & Core Competencies</legend>
                    <div class="form-grid">
                        <div class="form-group full-width">
                            <label for="input-tech-skills">Technical Skills (Comma Separated)</label>
                            <input type="text" id="input-tech-skills" name="techSkills" placeholder="JavaScript, React, Node.js, AWS, Docker">
                        </div>
                        <div class="form-group full-width">
                            <label for="input-soft-skills">Core / Soft Skills (Comma Separated)</label>
                            <input type="text" id="input-soft-skills" name="softSkills" placeholder="Agile Leadership, Cross-functional Communication, Problem Solving">
                        </div>
                    </div>
                </fieldset>

                <fieldset id="section-languages" class="form-section">
                    <legend>Languages & Certifications</legend>
                    <div class="form-grid">
                        <div class="form-group full-width">
                            <label for="input-languages">Languages Spoken</label>
                            <input type="text" id="input-languages" name="languages" placeholder="English (Native), Korean (Fluent)">
                        </div>
                        <div class="form-group full-width">
                            <label for="input-certifications">Licenses & Certifications</label>
                            <input type="text" id="input-certifications" name="certifications" placeholder="AWS Certified Solutions Architect, PMP">
                        </div>
                    </div>
                </fieldset>

                <fieldset id="section-awards" class="form-section">
                    <legend>Awards & Volunteer Work</legend>
                    <div class="form-grid">
                        <div class="form-group full-width">
                            <label for="input-awards">Honors & Awards</label>
                            <input type="text" id="input-awards" name="awards" placeholder="Best Open Source Contributor 2024">
                        </div>
                        <div class="form-group full-width">
                            <label for="input-volunteer">Volunteer Experience</label>
                            <input type="text" id="input-volunteer" name="volunteer" placeholder="Tech Mentor at Code.org (2022 - Present)">
                        </div>
                    </div>
                </fieldset>

                <fieldset id="section-additional" class="form-section">
                    <legend>Additional Information</legend>
                    <div class="form-grid">
                        <div class="form-group full-width">
                            <label for="input-additional">Interests & Miscellaneous Notes</label>
                            <input type="text" id="input-additional" name="additional" placeholder="Open-source contribution, Marathon runner, Blogging">
                        </div>
                    </div>
                </fieldset>

                <div style="display: flex; gap: 10px; margin-top: 1rem;">
                    <button type="button" id="btn-export-json" class="btn btn-secondary" style="flex: 1;">💾 Export JSON Backup</button>
                    <label class="btn btn-secondary" style="flex: 1; margin: 0; text-align: center;">
                        📂 Import Backup <input type="file" id="btn-import-json" accept=".json" style="display: none;">
                    </label>
                </div>

            </form>
        </section>

        <section class="preview-panel">
            <div class="preview-sticky-controls">
                <h2 id="preview-panel-title" class="panel-title" style="margin:0;">A4 Live Print Preview</h2>
                <div style="display: flex; gap: 10px;">
                    <button type="button" id="btn-export-pdf" class="btn btn-secondary">📄 Download High-Quality PDF</button>
                    <button type="button" id="btn-print" class="btn btn-print">🖨️ Print Resume</button>
                </div>
            </div>
            
            <div id="resume-preview" class="a4-page template-modern">
                <div id="output-resume-content">
                    </div>
            </div>
        </section>

    </main>

    <script src="script.js"></script>
</body>
</html>
